identity:
  companion_name: "Avery"
  user_name: "Jordan"
  timezone: "Europe/London"
  profile_path: "./examples/identity/avery/companion.profile.yaml"
  companion_md_path: "./examples/identity/avery/companion.md"
  provider_overrides_path: "./examples/identity/avery/provider-overrides"
